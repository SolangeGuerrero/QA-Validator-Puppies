<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="puppies-grad" x1="0" y1="0" x2="280" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5C39"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Paw icon (left of wordmark) -->
  <g transform="translate(8, 16)">
    <!-- Main pad -->
    <ellipse cx="24" cy="36" rx="18" ry="12" fill="url(#puppies-grad)"/>
    <!-- Top-left toe -->
    <circle cx="10" cy="16" r="6" fill="url(#puppies-grad)"/>
    <!-- Top-center-left toe -->
    <circle cx="22" cy="10" r="6.5" fill="url(#puppies-grad)"/>
    <!-- Top-center-right toe -->
    <circle cx="34" cy="12" r="6" fill="url(#puppies-grad)"/>
    <!-- Top-right toe -->
    <circle cx="42" cy="22" r="5.5" fill="url(#puppies-grad)"/>
  </g>

  <!-- Wordmark "puppies" -->
  <text x="68" y="56"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="44"
        font-weight="800"
        letter-spacing="-1.5"
        fill="url(#puppies-grad)">puppies</text>
</svg>
