server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip static assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

  # Long-cache hashed assets, no-cache for index.html
  location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Proxy API calls to the api service.
  # The trailing slash on proxy_pass strips the /api/ prefix, so /api/auth/me
  # becomes /auth/me on the upstream — matches apps/web/vite.config.ts dev proxy.
  location /api/ {
    proxy_pass http://api:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;     # AI validations can take minutes
    proxy_send_timeout 300s;
    client_max_body_size 100M;   # PDF / image uploads
  }

  # SPA fallback: any path not matched above falls back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
