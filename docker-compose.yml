# PURINA CreativeGuard — production stack
#
# Images live in the PRIVATE Docker Hub repo: solguerrero/purina-creativeguard
#
# Setup:
#   1. cp .env.docker.example .env  (and fill in real credentials)
#   2. docker login -u solguerrero   (token with read access)
#   3. docker compose pull
#   4. docker compose up -d
#
# Browse to http://localhost (or http://${WEB_PORT}).

services:
  api:
    image: solguerrero/purina-creativeguard:api
    env_file:
      - apps/api/.env
      - .env
    environment:
      # nginx serves the SPA on the host port, so magic-link redirects must point there
      # (not the dev Vite port). Override via DOCKER_WEB_URL when running compose.
      WEB_URL: ${DOCKER_WEB_URL:-http://localhost}
      NODE_ENV: production
      PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - purina

  web:
    image: solguerrero/purina-creativeguard:web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - purina

networks:
  purina:
    driver: bridge
